  - id: "portfolio"
    name: "Portfolio"
    description: "Creative portfolios and personal sites"
    
  - id: "ecommerce"
    name: "Ecommerce"
    description: "Online stores and product catalogs"
    
  - id: "documentation"
    name: "Documentation"
    description: "Technical docs and knowledge bases"
    
  - id: "dashboard"
    name: "Dashboard"
    description: "Admin dashboards and control panels"
    
  - id: "landing"
    name: "Landing Page"
    description: "Single-page marketing sites"
    
  - id: "business"
    name: "Business"
