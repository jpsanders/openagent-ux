# Design System Integrations
# Each template can be combined with these design systems

design_systems:
  - id: "swiss"
    name: "Swiss International"
    compatible_templates: "*"
    
  - id: "editorial"
    name: "Warm Editorial"
    compatible_templates: "*"
    
  - id: "tech-noir"
    name: "Tech Noir"
    compatible_templates: "*"
    
  - id: "playful"
    name: "Playful"
    compatible_templates: "*"
    
  - id: "minimal"
    name: "Minimal"
    compatible_templates: "*"
    
  - id: "contemporary"
    name: "Contemporary"
    compatible_templates: "*"
    
  - id: "template-default"
    name: "Template Default"
    description: "Use template's built-in design"
    compatible_templates: "*"

