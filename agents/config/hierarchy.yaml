# OpenAgent UX - Agent Hierarchy Configuration
# Defines the 3-tier hierarchical agent system

hierarchy:
  tiers:
    - name: "principal"
      role: "Principal Architect"
      tier: 1
      description: "Strategic decisions, project ownership, delegates to leads"
      port: 3000
      always_on: true
      sleep_timeout_minutes: 30
      
    - name: "design-lead"
      role: "Design Lead"
      tier: 2
      description: "Owns design system, brand identity, UI/UX patterns"
      port: 3001
      domain: "design"
      spawns_specialists: true
      max_specialists: 3
      
    - name: "frontend-lead"
      role: "Frontend Lead"
      tier: 2
      description: "Owns UI components, pages, responsive layouts"
      port: 3002
      domain: "frontend"
      spawns_specialists: true
      max_specialists: 5
      
    - name: "backend-lead"
      role: "Backend Lead"
      tier: 2
      description: "Owns API, database, server logic"
      port: 3003
      domain: "backend"
      spawns_specialists: true
      max_specialists: 3
      
    - name: "qa-lead"
      role: "QA Lead"
      tier: 2
      description: "Testing, accessibility, code quality"
      port: 3004
      domain: "qa"
      spawns_specialists: true
      max_specialists: 3

  communication:
    mode: "hybrid"
    event_bus: "workspace"
    request_response_timeout_seconds: 120
    
  spawning:
    strategy: "on-demand"
    warm_pool_seconds: 30
    idle_terminate_minutes: 15
    
  autonomy:
    approval_required: false
    max_retries: 3
    escalation_on_failure: true

  projects:
    - name: "openagent-ux"
      root: "."
      principal_id: "principal"
      active: true
